<section class="auth-flow-page container-xl py-4 pb-5">
  <div class="auth-flow-layout">
    <article class="card lh-card auth-flow-panel">
      <div class="card-body p-3 p-md-4">
        <p class="eyebrow">Email verification</p>
        <h1 class="h2 fw-bold mb-3">Verify your email</h1>

        @if (pending()) {
          <p class="alert alert-info mb-0" role="status">Verifying...</p>
        }

        @if (successMessage()) {
          <div class="d-grid gap-3">
            <p class="alert alert-success mb-0" role="status">{{ successMessage() }}</p>
            <a class="btn btn-lh-gold btn-lg fw-bold" routerLink="/login">Back to login</a>
          </div>
        }

        @if (errorMessage()) {
          <div class="d-grid gap-3">
            <p class="alert alert-danger mb-0" role="alert">{{ errorMessage() }}</p>
            <a class="auth-flow-link text-center fw-bold" routerLink="/login">Back to login</a>
          </div>
        }
      </div>
    </article>
  </div>
</section>
