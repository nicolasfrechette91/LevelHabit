name: CI and frontend deploy

on:
  pull_request:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend restore, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore backend
        run: dotnet restore backend/LevelHabit.Api.Tests/LevelHabit.Api.Tests.csproj

      - name: Build backend
        run: dotnet build backend/LevelHabit.Api.Tests/LevelHabit.Api.Tests.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test backend/LevelHabit.Api.Tests/LevelHabit.Api.Tests.csproj --configuration Release --no-build

  frontend:
    name: Frontend install, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: ./node_modules/.bin/ng test --watch=false

      - name: Build frontend
        working-directory: frontend
        run: ./node_modules/.bin/ng build --configuration production --base-href /LevelHabit/

      - name: Find build output
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        id: build-output
        working-directory: frontend
        shell: bash
        run: |
          INDEX_PATH=$(find dist -name index.html -type f | head -n 1)
          if [ -z "$INDEX_PATH" ]; then
            echo "No index.html found in frontend/dist"
            exit 1
          fi
          BUILD_DIR=$(dirname "$INDEX_PATH")
          echo "dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/${{ steps.build-output.outputs.dir }}

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    permissions:
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
