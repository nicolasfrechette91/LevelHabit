<div class="app-shell">
  <header class="navbar site-header sticky-top">
    <div class="container-xl d-flex flex-column flex-md-row align-items-stretch align-items-md-center gap-2">
      <a
        class="navbar-brand brand d-inline-flex align-items-center gap-2 m-0"
        [routerLink]="auth.isAuthenticated() ? '/dashboard' : '/login'"
        aria-label="LevelHabit"
      >
        <img ngSrc="levelhabit-mark.svg" alt="" width="36" height="36" priority>
        <span>LevelHabit</span>
      </a>

      @if (auth.isAuthenticated()) {
        <nav class="navbar-nav site-nav flex-row flex-wrap gap-1 ms-md-auto" aria-label="Primary">
          @for (item of navItems; track item.path) {
            <a
              class="nav-link rounded-3 px-3 py-2"
              [routerLink]="item.path"
              routerLinkActive="active"
              ariaCurrentWhenActive="page"
              [routerLinkActiveOptions]="{ exact: true }"
              [attr.data-testid]="'nav-' + item.path.slice(1)"
            >
              {{ item.label }}
            </a>
          }

          <button
            type="button"
            class="nav-link logout-button rounded-3 px-3 py-2"
            data-testid="logout-button"
            (click)="logout()"
          >
            Logout
          </button>
        </nav>
      } @else {
        <nav class="navbar-nav auth-nav flex-row align-items-center gap-2 ms-md-auto" aria-label="Account">
          <a
            class="nav-link auth-nav-link rounded-3 px-3 py-2"
            routerLink="/login"
            routerLinkActive="active"
            ariaCurrentWhenActive="page"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Log in
          </a>
          <a
            class="btn btn-lh-primary auth-create-link fw-bold"
            routerLink="/register"
            routerLinkActive="active"
            ariaCurrentWhenActive="page"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Create account
          </a>
        </nav>
      }
    </div>
  </header>

  @if (auth.emailVerificationNotice(); as notice) {
    <div class="container-xl pt-3">
      <div class="alert alert-success app-notice mb-0" role="alert">
        <span>{{ notice }}</span>
        <button
          type="button"
          class="btn-close"
          aria-label="Dismiss"
          (click)="auth.dismissEmailVerificationNotice()"
        ></button>
      </div>
    </div>
  }

  <main class="app-main">
    <router-outlet />
  </main>
</div>
